spring.application.name=demo2
spring.datasource.url=jdbc:postgresql://localhost:5432/fitness_club
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# JWT settings
jwt.access.secret=mySuperSecretKeyForAccessTokenThatIsAtLeast32BytesLong!
jwt.refresh.secret=mySuperSecretKeyForRefreshTokenThatIsAtLeast32BytesLong!
jwt.access.expiration=900000
jwt.refresh.expiration=604800000
logging.level.org.springframework.security=DEBUG